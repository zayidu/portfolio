<svg xmlns="http://www.w3.org/2000/svg" width="220" height="230" viewBox="0 0 220 230" role="img" aria-label="Swim goal progress">
  <defs>
    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2537" stop-opacity="0.88"/>
      <stop offset="55%" stop-color="#111827" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx="22%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="35%" stop-color="#38bdf8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#38bdf8" flood-opacity="0.07"/>
    </filter>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="196" height="206" rx="30" fill="url(#glassCard)" stroke="#94a3b8" stroke-opacity="0.18" filter="url(#shadow)"/>
  <ellipse cx="74" cy="38" rx="54" ry="16" fill="#ffffff" fill-opacity="0.10" filter="url(#blur)"/>
  <ellipse cx="154" cy="186" rx="58" ry="22" fill="#38bdf8" fill-opacity="0.10" filter="url(#blur)"/>
  <rect x="13" y="13" width="194" height="204" rx="29" fill="url(#glassGlow)"/>
  <circle cx="110" cy="92" r="58" fill="none" stroke="#cbd5e1" stroke-opacity="0.14" stroke-width="12"/>
  <circle
    cx="110"
    cy="92"
    r="58"
    fill="none"
    stroke="url(#progressGradient)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-dasharray="364.42"
    stroke-dashoffset="283.80"
    transform="rotate(-90 110 92)"
  />
  <circle cx="110" cy="92" r="42" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="110" y="84" text-anchor="middle" font-size="30">🏊</text>
  <text x="110" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">22%</text>
  <text x="110" y="154" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="0.8" fill="#f8fafc">Swim</text>
  <text x="110" y="180" text-anchor="middle" font-size="12.5" fill="#cbd5e1">44.2 / 200 km</text>
  <text x="110" y="204" text-anchor="middle" font-size="12.5" font-weight="700" fill="#bfdbfe">155.8 km to go</text>
</svg>
