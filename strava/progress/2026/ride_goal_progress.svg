<svg xmlns="http://www.w3.org/2000/svg" width="220" height="250" viewBox="0 0 220 250" role="img" aria-label="RIDE goal progress">
  <defs>
    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="196" height="226" rx="26" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <circle cx="110" cy="92" r="58" fill="none" stroke="#e2e8f0" stroke-width="12"/>
  <circle
    cx="110"
    cy="92"
    r="58"
    fill="none"
    stroke="url(#progressGradient)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-dasharray="364.42"
    stroke-dashoffset="335.03"
    transform="rotate(-90 110 92)"
  />
