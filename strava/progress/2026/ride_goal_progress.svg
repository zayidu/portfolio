  <text x="110" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">8%</text>
  <text x="110" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">RIDE</text>
  <text x="110" y="181" text-anchor="middle" font-size="13" fill="#334155">403.3 km of 5000.0 km</text>
  <text x="110" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316">4596.7 km to go</text>
</svg>
