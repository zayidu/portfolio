<svg xmlns="http://www.w3.org/2000/svg" width="220" height="250" viewBox="0 0 220 250" role="img" aria-label="Time progress for 2026">
  <defs>
    <linearGradient id="timeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="timeCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2537" stop-opacity="0.88"/>
      <stop offset="60%" stop-color="#111827" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="timeShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.48"/>
    </filter>
    <filter id="timeBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="196" height="226" rx="30" fill="url(#timeCard)" stroke="#94a3b8" stroke-opacity="0.18" filter="url(#timeShadow)"/>
  <rect x="20" y="20" width="180" height="94" rx="24" fill="#ffffff" fill-opacity="0.05"/>
  <ellipse cx="72" cy="44" rx="66" ry="24" fill="#ffffff" fill-opacity="0.14" filter="url(#timeBlur)"/>
  <ellipse cx="154" cy="206" rx="58" ry="22" fill="#38bdf8" fill-opacity="0.08" filter="url(#timeBlur)"/>
  <circle cx="110" cy="92" r="58" fill="none" stroke="#cbd5e1" stroke-opacity="0.14" stroke-width="12"/>
  <circle
    cx="110"
    cy="92"
    r="58"
    fill="none"
    stroke="url(#timeGradient)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-dasharray="364.42"
    stroke-dashoffset="296.92"
    transform="rotate(-90 110 92)"
  />
  <circle cx="110" cy="92" r="42" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="110" y="84" text-anchor="middle" font-size="30">⏳</text>
  <text x="110" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">19%</text>
  <text x="110" y="154" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="0.8" fill="#f8fafc">Year Clock</text>
  <text x="110" y="180" text-anchor="middle" font-size="12.5" fill="#cbd5e1">67 / 365 days</text>
  <text x="110" y="204" text-anchor="middle" font-size="12.5" font-weight="700" fill="#93c5fd">297 days left in 2026</text>
  <text x="110" y="224" text-anchor="middle" font-size="10.5" letter-spacing="1.2" fill="#67e8f9" fill-opacity="0.95">TIME PROGRESS</text>
</svg>
