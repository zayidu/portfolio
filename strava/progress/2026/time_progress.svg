<svg xmlns="http://www.w3.org/2000/svg" width="220" height="250" viewBox="0 0 220 250" role="img" aria-label="Time progress for 2026">
  <defs>
    <linearGradient id="timeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="timeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="196" height="226" rx="26" fill="#ffffff" stroke="#e2e8f0" filter="url(#timeShadow)"/>
  <circle cx="110" cy="92" r="58" fill="none" stroke="#e2e8f0" stroke-width="12"/>
  <circle
    cx="110"
    cy="92"
    r="58"
    fill="none"
    stroke="url(#timeGradient)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-dasharray="364.42"
    stroke-dashoffset="297.66"
    transform="rotate(-90 110 92)"
  />
  <text x="110" y="85" text-anchor="middle" font-size="28">⏳</text>
  <text x="110" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">18%</text>
  <text x="110" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">YEAR CLOCK</text>
  <text x="110" y="181" text-anchor="middle" font-size="13" fill="#334155">66 days of 365 days</text>
  <text x="110" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316">298 days left in 2026</text>
</svg>
